<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>100 days of coding</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #f5f1e8;
            --card: #fffaf1;
            --line: #d9cdb9;
            --text: #1e1b18;
            --muted: #6f665d;
            --accent: #1f7a4d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(31, 122, 77, 0.12), transparent 35%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(680px, 100%);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(30, 27, 24, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 5vw, 3.4rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .counter {
            margin: 28px 0;
            padding: 24px;
            border-radius: 16px;
            background: #f0eadc;
            border: 1px solid var(--line);
        }

        .days {
            font-size: clamp(3rem, 12vw, 5.5rem);
            line-height: 1;
            font-weight: 700;
            color: var(--accent);
        }

        .label {
            margin-top: 8px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .streak-card {
            margin-top: 24px;
        }

        .streak-card img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--line);
            display: block;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.95rem;
        }

        a {
            color: var(--text);
        }
    </style>
</head>
<body>
<main>
    <p>100 days of coding</p>
    <h1>Keep the streak alive.</h1>
    <p>
        Public GitHub streak for
        <a href="https://github.com/NRamm99" target="_blank" rel="noreferrer">NRamm99</a>.
    </p>

    <section class="counter" aria-live="polite">
        <div id="days" class="days">...</div>
        <div class="label">Days in a row</div>
        <p id="status" class="footer">Loading current streak...</p>
    </section>

    <section class="streak-card">
        <img
                src="https://github-readme-streak-stats.herokuapp.com?user=NRamm99&theme=default&hide_border=true"
                alt="GitHub streak chart for NRamm99">
    </section>
</main>

<script>
    async function loadStreak() {
        const days = document.getElementById("days");
        const status = document.getElementById("status");

        try {
            const response = await fetch("/api/streak");
            const data = await response.json();

            if (data.unavailable) {
                days.textContent = "--";
                status.textContent = "Could not load the streak right now.";
                return;
            }

            days.textContent = data.streakDays;
            status.textContent = "Latest contribution day: " + data.latestDate +
                " (" + data.latestContributionCount + " contributions)";
        } catch (error) {
            days.textContent = "--";
            status.textContent = "Could not load the streak right now.";
        }
    }

    loadStreak();
</script>
</body>
</html>
